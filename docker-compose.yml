version: '3.8'

services:
  # 1. MongoDB (Self-hosted for Oracle Cloud)
  mongodb:
    image: mongo:latest
    container_name: crm-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS:-secret}

  # 2. Redis (For Socket.io scaling)
  redis:
    image: redis:alpine
    container_name: crm-redis
    restart: always

  # 3. API Gateway
  gateway:
    build: ./microservices/gateway
    container_name: crm-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - LEAD_SERVICE_URL=http://lead-service:3002
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
      - REPORT_SERVICE_URL=http://reporting-service:3004
    depends_on:
      - auth-service
      - lead-service

  # 4. Auth Service
  auth-service:
    build: ./microservices/auth-service
    container_name: crm-auth
    restart: always
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/spike_crm?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb

  # 5. Lead Service
  lead-service:
    build: ./microservices/lead-service
    container_name: crm-lead
    restart: always
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/spike_crm?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
    depends_on:
      - mongodb

  # 6. Notification Service (Socket.io)
  notification-service:
    build: ./microservices/notification-service
    container_name: crm-notification
    restart: always
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/spike_crm?authSource=admin
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  # 7. Reporting Service
  reporting-service:
    build: ./microservices/reporting-service
    container_name: crm-reporting
    restart: always
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/spike_crm?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb

  # 8. Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway

volumes:
  mongodb_data:
