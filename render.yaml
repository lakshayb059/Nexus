services:
  # Web Service
  - type: web
    name: crm-backend
    env: node
    plan: free
    buildCommand: "npm run build"
    startCommand: "npm run start"

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://crm-eight-sage.vercel.app
      - key: MONGODB_URI
        value: mongodb+srv://gargabhi999:gargabhi999@crm.8eds5va.mongodb.net/?appName=CRM
      - key: MAX_FILE_SIZE
        value: 10mb
    
    # Auto-deploy from main branch
    autoDeploy: true
    
    # Health check
    healthCheckPath: /api/contacts/stats
