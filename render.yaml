services:
  # 1. API Gateway
  - type: web
    name: spike-crm-gateway
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node microservices/gateway/server.js
    envVars:
      - key: AUTH_SERVICE_URL
        sync: false
      - key: LEAD_SERVICE_URL
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        sync: false
      - key: REPORT_SERVICE_URL
        sync: false

  # 2. Auth Service
  - type: web
    name: spike-crm-auth
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node microservices/auth-service/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # 3. Lead Service
  - type: web
    name: spike-crm-lead
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node microservices/lead-service/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        sync: false
      - key: MAIL_SERVICE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # 4. Notification Service
  - type: web
    name: spike-crm-notification
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node microservices/notification-service/server.js
    envVars:
      - key: DATABASE_URL
        sync: false

  # 5. Reporting Service
  - type: web
    name: spike-crm-reporting
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node microservices/reporting-service/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # 6. Mail Service
  - type: web
    name: spike-crm-mail
    env: node
    plan: free
    buildCommand: cd microservices/mail-service && npm install
    startCommand: cd microservices/mail-service && node server.js
    envVars:
      - key: BREVO_USER
        sync: false
      - key: BREVO_PASS
        sync: false
      - key: BREVO_SENDER
        sync: false
